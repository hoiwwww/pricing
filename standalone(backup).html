    const avg  = (rows, key) => rows.length ? rows.reduce((s, r) => s + (r[key] ?? 0), 0) / rows.length : 0;
    const sumBy = (rows, k) => rows.reduce((a, r) => a + (r[k] ?? 0), 0);

    function computeRows(adjMap, base, cofVal) {
      return base.map((s) => {
        const bp = adjMap[s.grade] ?? 0;
        const churnNew = Math.max(0, s.churn + (bp / 10) * s.elasticity);
        const retainRatio = (100 - churnNew) / (100 - s.churn);
        const balNew = s.balance * retainRatio;
        const marginNew = s.margin + bp / 100;
        const intOld = (s.balance * s.margin) / 100;
        const intNew = (balNew * marginNew) / 100;
        const cmRateOld = s.margin - cofVal - s.legalCostRate - s.contractCreditRate;
        const cmRateNew = marginNew - cofVal - s.legalCostRate - s.contractCreditRate;
        const cmOld = (s.balance * cmRateOld) / 100;
        const cmNew = (balNew * cmRateNew) / 100;
        const opAdjRate = s.contractOpRate + s.creditGapRate + s.opGapRate - s.nonIntRate;
        const opOld = cmOld - (s.balance * opAdjRate) / 100;
        const opNew = cmNew - (balNew * opAdjRate) / 100;
        return {
          grade: s.grade, bp,
          balOld: s.balance, balNew,
          cntOld: s.count, cntNew: s.count * retainRatio,
          newWkOld: s.newWk, newWkNew: s.newWk * retainRatio,
          netWkOld: s.netWk, netWkNew: s.netWk * retainRatio,
          churnOld: s.churn, churnNew,
          intOld, intNew, cmOld, cmNew, opOld, opNew,
        };
      });
    }

    function runSimulation(adjMap, base, cofVal, indirectParams) {
      const rows = computeRows(adjMap, base, cofVal);
      const tot = {
        balOld: sumBy(rows,"balOld"), balNew: sumBy(rows,"balNew"),
        cntOld: sumBy(rows,"cntOld"), cntNew: sumBy(rows,"cntNew"),
        newWkOld: sumBy(rows,"newWkOld"), newWkNew: sumBy(rows,"newWkNew"),
        netWkOld: sumBy(rows,"netWkOld"), netWkNew: sumBy(rows,"netWkNew"),
        intOld: sumBy(rows,"intOld"), intNew: sumBy(rows,"intNew"),
        cmOld: sumBy(rows,"cmOld"), cmNew: sumBy(rows,"cmNew"),
        opOld: sumBy(rows,"opOld"), opNew: sumBy(rows,"opNew"),
      };
      tot.roaOld = tot.balOld ? (tot.opOld / tot.balOld) * 100 : 0;
      tot.roaNew = tot.balNew ? (tot.opNew / tot.balNew) * 100 : 0;
      const custGain = tot.cntNew - tot.cntOld;
      const { cardRate, depositRate, mauRate } = indirectParams;
      return { rows, tot, indirect: { custGain, cardEffect: custGain * (cardRate / 100), depositEffect: (custGain * depositRate) / 10000, mauEffect: custGain * (mauRate / 100) } };
    }

    function findOptimalAdj(base, cofVal, { churnCap = 15, range = 50, step = 5 } = {}) {
      const steps = [];
      for (let b = -range; b <= range; b += step) steps.push(b);
      const bestAdj = {};
      base.forEach((s) => {
        let bestBp = 0, bestCm = -Infinity;
        steps.forEach((bp) => {
          const churnNew = Math.max(0, s.churn + (bp / 10) * s.elasticity);
          if (churnNew - s.churn > churnCap) return;
          const balNew = s.balance * (100 - churnNew) / (100 - s.churn);
          const cm = (balNew * (s.margin + bp / 100 - cofVal - s.legalCostRate - s.contractCreditRate)) / 100;
          if (cm > bestCm) { bestCm = cm; bestBp = bp; }
        });
        bestAdj[s.grade] = bestBp;
      });
      return bestAdj;
    }

    // ── CSV 파서 ──
    function parseRows(text, { stringCols = [] } = {}) {
      const lines = text.trim().split("\n").filter((l) => l.trim());
      const [header, ...body] = lines;
      const cols = header.split(",").map((c) => c.trim());
      return body.map((line) => {
        const vals = line.split(",");
        const row = {};
        cols.forEach((c, i) => { const v = vals[i]?.trim(); row[c] = stringCols.includes(c) ? v : isNaN(Number(v)) ? v : Number(v); });
        return row;
      });
    }
    const parseWeekly   = (t) => parseRows(t, { stringCols: ["week","phase"] });
    const parseMonthly  = (t) => parseRows(t, { stringCols: ["month"] });
    const parseSimBase  = (t) => parseRows(t, { stringCols: ["grade"] });
    function parseFunnelWide(text) {
      return parseRows(text, { stringCols: ["grade"] }).map((r) => ({
        grade: r.grade,
        platformInflow:    [r.platformInflow_before    ?? 0, r.platformInflow_after    ?? 0],
        preApprovalExec:   [r.preApprovalExec_before   ?? 0, r.preApprovalExec_after   ?? 0],
      }));
    }
    function readCsvFile(file, parser, onParsed, errMsg) {
      const reader = new FileReader();
      reader.onload = (ev) => { try { onParsed(parser(ev.target.result)); } catch { alert(errMsg); } };
      reader.readAsText(file);
    }

    // ── WaveBar ──
    function WaveBar({ x, y, width, height, fill }) {
      if (x == null || width == null) return null;
      const cut = 14, topH = Math.max(0, height - cut), q = width / 4, midY = y + topH + cut / 2;
      return (
        <g>
          <rect x={x} y={y} width={width} height={topH} fill={fill} rx={4} />
          <path d={`M ${x} ${midY} q ${q/2} -6 ${q} 0 t ${q} 0 t ${q} 0 t ${q} 0`} stroke={fill} strokeWidth={3} fill="none" opacity={0.9} />
        </g>
      );
    }

      const weeklyBefore = weekly.filter((d) => d.phase === "before");
      const weeklyAfter  = weekly.filter((d) => d.phase === "after");

      const weeklySummary = WEEKLY_KPI_DEFS.map((k) => {
        const b = avg(weeklyBefore, k.key);
        const a = avg(weeklyAfter,  k.key);
        return { ...k, after: a, delta: b ? ((a - b) / b) * 100 : 0 };
      });

      const highBefore = monthlyHigh.filter((d) => ev.beforeMonths.includes(d.month));
      const highAfter  = monthlyHigh.filter((d) => ev.afterMonths.includes(d.month));
      const lowBefore  = monthlyLow.filter((d) => ev.beforeMonths.includes(d.month));
      const lowAfter   = monthlyLow.filter((d) => ev.afterMonths.includes(d.month));

        const b = avg(highBefore, k.key), a = avg(highAfter, k.key);
        return { ...k, after: a, delta: b ? ((a - b) / b) * 100 : 0 };
      });
      const lowSummary = PROFIT_KPI_DEFS.map((k) => {
        const b = avg(lowBefore, k.key), a = avg(lowAfter, k.key);
        return { ...k, after: a, delta: b ? ((a - b) / b) * 100 : 0 };
      });

      // 통합 월간 차트 (고+중저)
      const allMonths = ["1월","2월","3월","4월","5월","6월"];

        const h = monthlyHigh.find((d) => d.month === m) ?? {};

        return {
          name: m,
          이자수익: (h.interest ?? 0) + (l.interest ?? 0),
          공헌이익: (h.contribution ?? 0) + (l.contribution ?? 0),
          영업이익: (h.operatingProfit ?? 0) + (l.operatingProfit ?? 0),

          <div style={{ display: "flex", gap: 10, marginBottom: 24, flexWrap: "wrap", alignItems: "center" }}>
            <label style={S.uploadBtnSm}><Upload size={13} /> 주간 실적 CSV ({ev.label.split(" ")[0]})<input type="file" accept=".csv" onChange={handleWeeklyUpload} hidden /></label>
            <label style={S.uploadBtnSm}><Upload size={13} /> 퍼널 CSV ({ev.label.split(" ")[0]})<input type="file" accept=".csv" onChange={handleFunnelUpload} hidden /></label>
            <span style={{ fontSize: 11, color: C.faint }}>주간: {weeklyFileByEvent[activeEvent]} · 퍼널: {funnelFileByEvent[activeEvent]}</span>
          </div>

          {/* ── 섹션 1: 주간 영업 지표 ── */}
          <div style={S.sectionLabel}>
            주간 영업 지표
            <span style={S.sectionBadge}>매주 갱신</span>
          </div>
          <section style={{ ...S.cardGrid }}>
            {weeklySummary.map((k, i) => (
              <KpiCard key={k.key} label={k.label} value={k.fmt(k.after)} unit={k.unit} delta={k.delta} animDelay={i * 60} />
            ))}
          </section>
          <section style={S.chartCard}>
            <div style={S.chartTitle}>주간 신규대출 실행액 · 순증액 추이</div>
            <ResponsiveContainer width="100%" height={260}>
              <BarChart data={weekly} margin={{ top: 30, right: 20, left: 0, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.gridLine} />
                <XAxis dataKey="week" tick={{ fill: C.sub, fontSize: 12 }} />
                <YAxis tick={{ fill: C.sub, fontSize: 12 }} unit="억" />
                <Tooltip contentStyle={tooltipStyle} cursor={{ fill: "rgba(1,20,167,.04)" }} />
                <Legend wrapperStyle={{ fontSize: 12, color: C.text }} />
                <ReferenceLine x={ev.refWeek} stroke={C.primary} strokeDasharray="4 4"
                  label={{ value: "금리변경", fill: C.primary, fontSize: 11, position: "insideTopRight", offset: 8 }} />
                <Bar dataKey="newLoan" name="신규실행액(주, 억)" fill={C.primary}   radius={[4,4,0,0]} />
                <Bar dataKey="netLoan" name="순증액(주, 억)"     fill={C.secondary} radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
            <div style={S.miniNote}>* 신규실행액 = 주간 신규대출 실행 금액 · 순증액 = 실행 − 상환(만기·중도)</div>
          </section>

          {/* ── 섹션 2: 수익성 지표 ── */}
          <div style={S.sectionLabel}>
            수익성 지표
            <span style={{ ...S.sectionBadge, color: "#dc2626", borderColor: "rgba(220,38,38,.25)", background: "rgba(220,38,38,.05)" }}>익월 4일 집계</span>
            <span style={{ fontSize: 11, color: C.faint, fontWeight: 400 }}>비교: {ev.beforeMonths.join("·")} 평균 → {ev.afterMonths.join("·")} 평균</span>
          </div>

          {/* 고신용자 수익성 */}
          <div style={S.subSectionLabel}>
            고신용자 수익성지표
            <span style={{ fontSize: 11, color: C.sub, fontWeight: 400 }}>(신용평가 기준 고신용 — 전략등급과 독립)</span>
          </div>
          <section style={{ ...S.cardGrid }}>
            {highSummary.map((k, i) => (
              <KpiCard key={"h-"+k.key} label={k.label} value={k.fmt(k.after)} unit={k.unit} delta={k.delta} animDelay={i * 60} />
            ))}
          </section>

          {/* 중저신용자 수익성 */}
          <div style={S.subSectionLabel}>
            중저신용자 수익성지표
            <span style={{ fontSize: 11, color: C.sub, fontWeight: 400 }}>(신용평가 기준 중저신용 — 전략등급과 독립)</span>
          </div>
          <section style={{ ...S.cardGrid }}>
            {lowSummary.map((k, i) => (
              <KpiCard key={"l-"+k.key} label={k.label} value={k.fmt(k.after)} unit={k.unit} delta={k.delta} animDelay={i * 60} />
            ))}
          </section>

          {/* 통합 월간 추이 차트 */}
          <section style={S.chartCard}>
            <div style={S.chartTitle}>월간 수익성 지표 추이 — 고신용 + 중저신용 통합</div>
            <ResponsiveContainer width="100%" height={290}>
              <BarChart data={combinedChart} margin={{ top: 10, right: 20, left: 0, bottom: 0 }} barCategoryGap="28%">
                <CartesianGrid strokeDasharray="3 3" stroke={C.gridLine} />
                <XAxis dataKey="name" tick={{ fill: C.sub, fontSize: 12 }} />
                <YAxis tick={{ fill: C.sub, fontSize: 12 }} unit="억" />
                <Tooltip contentStyle={tooltipStyle} cursor={{ fill: "rgba(1,20,167,.04)" }} />
                <Legend wrapperStyle={{ fontSize: 12, color: C.text }} />
                <ReferenceLine x="4월" stroke="#6b7488" strokeDasharray="3 3"
                  label={{ value: "3/31", fill: "#6b7488", fontSize: 10, position: "top" }} />
                <ReferenceLine x="5월" stroke="#6b7488" strokeDasharray="3 3"
                  label={{ value: "4/23", fill: "#6b7488", fontSize: 10, position: "top" }} />
                <ReferenceLine x="6월" stroke={C.primary} strokeDasharray="3 3"
                  label={{ value: "5/29", fill: C.primary, fontSize: 10, position: "top" }} />
                <Bar dataKey="이자수익" fill={C.barInactive} radius={[4,4,0,0]} />
                <Bar dataKey="공헌이익" fill={C.secondary}  radius={[4,4,0,0]} />
                <Bar dataKey="영업이익" fill={C.primary}    radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
            <div style={S.miniNote}>
              * 이자수익 → 공헌이익 → 영업이익 순으로 비용 차감 (고신용+중저신용 합산). 각 수직선은 금리 변경 시행일.<br />
              고신용·중저신용 월간 수익성 CSV는 상단 업로드 버튼(고신용/중저신용)으로 교체하세요.
            </div>
          </section>

          {/* ── 섹션 3: 퍼널 전환율 ── */}
          <div style={S.sectionLabel}>퍼널 전환율 — {ev.label}</div>
          <div style={S.funnelGrid}>
            {[
              { key: "platformInflow",  label: "플랫폼 → 당행 유입률", desc: "플랫폼 유입 후 당행 선택 비율 (전략등급별)", positive: true  },
              { key: "preApprovalExec", label: "가심사승인 → 실행 전환율", desc: "가심사 승인 후 실행까지 전환 비율 (전략등급별)", positive: true },
            ].map((m) => {
              const chartData = funnel.map((d) => ({
                grade: d.grade,
                시행전: d[m.key]?.[0] ?? 0,
                시행후: d[m.key]?.[1] ?? 0,
              }));
              return (
                <section key={m.key} style={S.chartCard}>
                  <div style={S.funnelTitle}>{m.label}</div>
                  <div style={S.funnelDesc}>{m.desc}</div>
                  <ResponsiveContainer width="100%" height={220}>
                    <BarChart data={chartData} margin={{ top: 6, right: 8, left: -12, bottom: 0 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke={C.gridLine} />
                      <XAxis dataKey="grade" tick={{ fill: C.sub, fontSize: 11 }} />
                      <YAxis tick={{ fill: C.sub, fontSize: 11 }} unit="%" />
                      <Tooltip contentStyle={tooltipStyle} cursor={{ fill: "rgba(1,20,167,.04)" }} />
                      <Legend wrapperStyle={{ fontSize: 11, color: C.text }} />
                      <Bar dataKey="시행전" fill={C.barInactive} radius={[3,3,0,0]} />
                      <Bar dataKey="시행후" fill={C.primary}     radius={[3,3,0,0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </section>
              );
            })}
          </div>
        </>
      );
    }

    // ── App ──
    function App() {
      const [page, setPage]               = useState("sim");
      const [activeEvent, setActiveEvent] = useState("ev331");
      const [simBase, setSimBase]         = useState(DEMO_SIM_BASE);
      const [baseFile, setBaseFile]       = useState("기본 가정값");
      const [cof, setCof]                 = useState(COF_DEFAULT);
      const [cardRate, setCardRate]       = useState(35);
      const [depositRate, setDepositRate] = useState(120);
      const [mauRate, setMauRate]         = useState(60);
      const [adj, setAdj]                 = useState(() => DEMO_SIM_BASE.reduce((o, s) => ({ ...o, [s.grade]: 0 }), {}));

      const [weeklyByEvent,     setWeeklyByEvent]     = useState(DEMO_WEEKLY);
      const [weeklyFileByEvent, setWeeklyFileByEvent] = useState({ ev331: "데모 데이터", ev423: "데모 데이터", ev529: "데모 데이터" });
      const [monthlyHigh,       setMonthlyHigh]       = useState(DEMO_MONTHLY_HIGH);
      const [monthlyLow,        setMonthlyLow]        = useState(DEMO_MONTHLY_LOW);
      const [monthlyHighFile,   setMonthlyHighFile]   = useState("데모 데이터");
      const [monthlyLowFile,    setMonthlyLowFile]    = useState("데모 데이터");
      const [funnelByEvent,     setFunnelByEvent]     = useState(DEMO_FUNNEL);
      const [funnelFileByEvent, setFunnelFileByEvent] = useState({ ev331: "데모 데이터", ev423: "데모 데이터", ev529: "데모 데이터" });

      const sim = useMemo(
        () => runSimulation(adj, simBase, cof, { cardRate, depositRate, mauRate }),
        [adj, simBase, cof, cardRate, depositRate, mauRate]
      );
      const handleFindOptimal = () => setAdj(findOptimalAdj(simBase, cof));
      const handleResetAdj    = () => setAdj(simBase.reduce((o, s) => ({ ...o, [s.grade]: 0 }), {}));
      function handleBaseUpload(e) {
        const file = e.target.files?.[0]; if (!file) return;
        setBaseFile(file.name);
        readCsvFile(file, parseSimBase, (parsed) => { setSimBase(parsed); setAdj(parsed.reduce((o, s) => ({ ...o, [s.grade]: 0 }), {})); },
          "기준값 CSV 파싱 실패");
      }
      function handleMonthlyHighUpload(e) {
        const file = e.target.files?.[0]; if (!file) return;
        setMonthlyHighFile(file.name);
        readCsvFile(file, parseMonthly, setMonthlyHigh, "고신용 수익성 CSV 파싱 실패. 헤더: month,interest,contribution,operatingProfit,roa");
      }
      function handleMonthlyLowUpload(e) {
        const file = e.target.files?.[0]; if (!file) return;
        setMonthlyLowFile(file.name);
        readCsvFile(file, parseMonthly, setMonthlyLow, "중저신용 수익성 CSV 파싱 실패. 헤더: month,interest,contribution,operatingProfit,roa");
      }

      return (
        <div style={S.page}>
          <header style={S.header}>
            <div>
              <div style={S.eyebrow}>CORPORATE 여신 · 전략·재무</div>
              <h1 style={S.title}>Corporate여신팀 · 사장님신용대출 금리전략 대시보드</h1>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, alignItems: "flex-end" }}>
              <label style={S.uploadBtn}><Upload size={15} /><span>고신용 수익성 CSV (월간)</span><input type="file" accept=".csv" onChange={handleMonthlyHighUpload} hidden /></label>
              <label style={{ ...S.uploadBtnSm, fontSize: 12.5 }}><Upload size={13} /> 중저신용 수익성 CSV (월간)<input type="file" accept=".csv" onChange={handleMonthlyLowUpload} hidden /></label>
              <span style={{ fontSize: 11, color: C.faint, textAlign: "right" }}>고: {monthlyHighFile} · 중저: {monthlyLowFile}</span>
            </div>
          </header>
          <nav style={S.tabs}>
            <button onClick={() => setPage("sim")}    style={{ ...S.tab, ...(page === "sim"    ? S.tabActive : {}) }}><Sliders   size={15} /> 금리 조정 시뮬레이터</button>
            <button onClick={() => setPage("result")} style={{ ...S.tab, ...(page === "result" ? S.tabActive : {}) }}><BarChart3 size={15} /> 시행 실적</button>
          </nav>
          {page === "sim"
            ? <Simulator sim={sim} adj={adj} setAdj={setAdj} simBase={simBase} cof={cof} setCof={setCof}
                cardRate={cardRate} setCardRate={setCardRate} depositRate={depositRate} setDepositRate={setDepositRate}
                mauRate={mauRate} setMauRate={setMauRate} onFindOptimal={handleFindOptimal}
                onResetAdj={handleResetAdj} onBaseUpload={handleBaseUpload} baseFile={baseFile} />
            : <ResultPage
                activeEvent={activeEvent} setActiveEvent={setActiveEvent}
                weeklyByEvent={weeklyByEvent} setWeeklyByEvent={setWeeklyByEvent}
                weeklyFileByEvent={weeklyFileByEvent} setWeeklyFileByEvent={setWeeklyFileByEvent}
                monthlyHigh={monthlyHigh} monthlyLow={monthlyLow}
                funnelByEvent={funnelByEvent} setFunnelByEvent={setFunnelByEvent}
                funnelFileByEvent={funnelFileByEvent} setFunnelFileByEvent={setFunnelFileByEvent}
              />
          }
          <footer style={S.footer}>프로토타입 · 탄력성 계수·자금원가율·간접효과 n%는 가정값이며 실측치로 대체 예정 · ADW 데이터 구축 후 수익성 실측치 연결 예정</footer>
        </div>
      );
    }

    createRoot(document.getElementById("root")).render(<React.StrictMode><App /></React.StrictMode>);
  </script>
</body>
</html>
